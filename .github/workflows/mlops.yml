name: MLOps Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ -v

  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}
    env:
      MLFLOW_TRACKING_URI: https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/mlops-lab-vinuni.mlflow
      MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.13.0 scikit-learn pandas pyyaml joblib dvc-s3==3.3.0
      - name: Pull data with DVC
        run: |
          python -m dvc remote modify dagshub --local access_key_id ${{ secrets.DAGSHUB_TOKEN }}
          python -m dvc remote modify dagshub --local secret_access_key ${{ secrets.DAGSHUB_TOKEN }}
          python -m dvc pull -r dagshub
      - name: Train model
        run: python src/train.py
      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; print(json.load(open('outputs/metrics.json'))['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT
      - name: DVC Push Model
        run: |
          python -m dvc add models/model.pkl
          python -m dvc push -r dagshub
      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlops-performance-report
          path: |
            outputs/metrics.json
            outputs/report.txt
      - name: Print Performance Report
        run: cat outputs/report.txt

  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Check eval gate
        run: |
          python -c "
          import sys
          acc = float(${{ needs.train.outputs.accuracy }})
          print(f'Current accuracy: {acc}')
          if acc < 0.60:
              print('Accuracy too low!')
              sys.exit(1)
          else:
              print('Accuracy threshold passed!')
          "

  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - name: Mock Deploy
        run: |
          echo "Deploying to production server..."
          echo "Server: http://localhost:8002"
          echo "Status: SUCCESS"
